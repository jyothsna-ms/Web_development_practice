<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box
        {
            text-align: center;
            background-color: aquamarine;
            width:300px;
            height:200px;

            /* border:1px solid black; */
            /* border:2px dashed black; */
            /* border:3px dotted green; */
            border:4px double orange;

            border-radius: 10px;
            padding:30px;

            /* margin:20px; */
            /* margin:auto; */
            box-sizing:content-box;
            /* It will include width + padding + margin + border */

        }
        p{
            border-bottom:2px double black;
            padding-top:20px;
        }
    </style>
</head>
<body>
    <div class="box">
        
        <p>Hello guys</p>
    </div>
    <div class="box">
        <p>Book</p>
    </div>
</body>
</html>
