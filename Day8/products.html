<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:100vh;
            margin:0;
            padding:0;
            box-sizing: border-box;
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content: center;
            gap:20px;
            align-items:center;
            /* use this to make it look clean in every device */
            flex-wrap:wrap;
        }
        .product{

            border:1px solid black;
            box-sizing: border-box;
            width:250px;
            border-radius:10px;
            margin-bottom: 15px;
            padding:12px;
            text-align:center;
            /* box-shadow:Xaxis Yaxis Spread-radius Color */
            box-shadow: 4px 4px 8px black;
        }
        .product h2{
            border-bottom:1px solid black;
        }
        .product img{
            object-fit:cover;
            border-radius:10px;
            width:100%;

        }
        .product button{
            background-color: orange;
            border:none;
            padding:10px;
            border-radius:10px;
            width:90%;
        }
    </style>
</head>
<body>
    
    <div class="product">
        <img height="150" width="150" src="https://images.pexels.com/photos/5793947/pexels-photo-5793947.jpeg">
        <h2>Laptop</h2>
        <p>25,000</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img height="150" width="150" src="https://images.pexels.com/photos/7772548/pexels-photo-7772548.jpeg">
        <h2>Headphone</h2>
        <p>2,499</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img height="150" width="150" src="https://images.pexels.com/photos/569062/pexels-photo-569062.png">
        <h2>Mobile phone</h2>
        <p>15,999</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img height="150" width="150" src="https://images.pexels.com/photos/7880182/pexels-photo-7880182.jpeg">
        <h2>Running Shoes</h2>
        <p>1,999</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
