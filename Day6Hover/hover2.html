<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            height: 200px;
            width: 200px;
            background-color: antiquewhite;
        }
        #box:hover{
            transform:translatex(100px);
            transition: 3s;
        }
        .xyz{
            background-color: rgb(70, 146, 146);
            height: 200px;
            width: 200px;
        }
        .xyz:hover{
            transform:rotate(360deg);
            transition: 3s;
        }
        .abc{background-color: rgb(70, 146, 146);
            height: 200px;
            width: 200px;
        

        }
        .abc:hover{
            transform:scale(1.02);
            transition: 2s;
        }
    </style>
</head>
<body>
    <div id="box">
      Hi
    </div>
    <div class="xyz">
        Hello
    </div>
    <div class="abc">
        hai
    </div>
</body>
</html>
